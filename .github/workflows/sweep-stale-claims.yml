name: sweep-stale-claims

# Poor-man's lease expiry across every non-terminal state. Every 30 min, find
# issues that a vanished agent could strand forever and return them to the queue:
#   - state:in-progress      — a claim with no activity for STALE_HOURS.
#   - state:in-review        — no open PR from its agent/issue-<N> branch (the PR
#                              was closed or abandoned without merging).
#   - state:changes-requested — no activity for STALE_HOURS after a human asked
#                              for changes.
# The per-issue decision lives in scripts/sweep-stale-claims.mjs so it can be
# unit-tested off the network and can never diverge from what runs here.
# A crashed agent costs at most STALE_HOURS of delay, no human action.

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch: {}

permissions:
  issues: write
  pull-requests: read   # detect an open PR for an in-review claim branch
  contents: write       # delete orphaned (zero-commit) claim refs

env:
  STALE_HOURS: "2"

jobs:
  sweep:
    runs-on: ubuntu-latest
    steps:
      # Checkout so the github-script step can import the shared decision helper
      # (scripts/sweep-stale-claims.mjs) — the single source of truth for the
      # sweep, reused verbatim by the test.
      - uses: actions/checkout@v4
      - uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.FACTORY_PAT || secrets.GITHUB_TOKEN }}
          script: |
            const { pathToFileURL } = require("node:url");
            const { decideSweep, SWEPT_STATES } = await import(
              pathToFileURL(`${process.env.GITHUB_WORKSPACE}/scripts/sweep-stale-claims.mjs`).href
            );

            const staleHours = process.env.STALE_HOURS;
            const staleMs = Number(staleHours) * 3600 * 1000;
            const now = Date.now();

            const open = await github.paginate(github.rest.issues.listForRepo, {
              owner: context.repo.owner, repo: context.repo.repo,
              state: "open", per_page: 100,
            });

            for (const issue of open) {
              if (issue.pull_request) continue;
              const state = issue.labels.map(l => l.name).find(l => SWEPT_STATES.has(l));
              if (!state) continue;
              const branch = `agent/issue-${issue.number}`;

              // Signals fetched only where a state needs them.
              let aheadBy = null, lastCommitAt = null, claimAt = null, hasOpenPr = false;

              // in-progress and changes-requested weigh the branch's commits.
              if (state === "state:in-progress" || state === "state:changes-requested") {
                try {
                  const cmp = await github.rest.repos.compareCommitsWithBasehead({
                    owner: context.repo.owner, repo: context.repo.repo, basehead: `main...${branch}`,
                  });
                  aheadBy = cmp.data.ahead_by;
                } catch (e) {
                  // branch absent or uncomparable -> claim-timed / no commit signal
                }
                if (aheadBy > 0) {
                  try {
                    const c = await github.rest.repos.listCommits({
                      owner: context.repo.owner, repo: context.repo.repo, sha: branch, per_page: 1,
                    });
                    const d = c.data[0]?.commit?.committer?.date;
                    lastCommitAt = d ? new Date(d).getTime() : null;
                  } catch (e) {
                    // branch vanished between compare and list -> fall back inside the helper
                  }
                }
              }

              // in-progress freshness can fall back to the claim event.
              if (state === "state:in-progress") {
                try {
                  const events = await github.paginate(github.rest.issues.listEvents, {
                    owner: context.repo.owner, repo: context.repo.repo, issue_number: issue.number, per_page: 100,
                  });
                  const claims = events.filter(e => e.event === "labeled" && e.label && e.label.name === "state:in-progress");
                  claimAt = claims.length ? new Date(claims[claims.length - 1].created_at).getTime() : null;
                } catch (e) {
                  // timeline unreadable -> fall back to issue update inside the helper
                }
              }

              // in-review turns solely on whether a PR is still driving the branch.
              if (state === "state:in-review") {
                try {
                  const prs = await github.rest.pulls.list({
                    owner: context.repo.owner, repo: context.repo.repo,
                    state: "open", head: `${context.repo.owner}:${branch}`, per_page: 1,
                  });
                  hasOpenPr = prs.data.length > 0;
                } catch (e) {
                  // PR list unreadable -> treat as an open PR (safe: never sweep on doubt)
                  hasOpenPr = true;
                }
              }

              const decision = decideSweep({
                state, now, staleMs, staleHours, branch, aheadBy, lastCommitAt, claimAt,
                updatedAt: new Date(issue.updated_at).getTime(), hasOpenPr,
              });
              if (!decision.sweep) continue;

              const labels = issue.labels.map(l => l.name).filter(l => !l.startsWith("state:"));
              labels.push("state:ready");
              await github.rest.issues.setLabels({ owner: context.repo.owner, repo: context.repo.repo, issue_number: issue.number, labels });
              await github.rest.issues.removeAssignees({
                owner: context.repo.owner, repo: context.repo.repo, issue_number: issue.number,
                assignees: issue.assignees.map(a => a.login),
              }).catch(() => {});

              if (decision.deleteRef) {
                await github.rest.git.deleteRef({
                  owner: context.repo.owner, repo: context.repo.repo, ref: `heads/${branch}`,
                }).catch(() => {});
              }

              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo, issue_number: issue.number, body: decision.comment,
              });
            }
