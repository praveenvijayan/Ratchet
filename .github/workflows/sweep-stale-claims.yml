name: sweep-stale-claims

# Poor-man's lease expiry. Every 30 min, find issues stuck in state:in-progress
# that have shown no activity for STALE_HOURS, and return them to the queue.
# Freshness is the most recent proof of life: the branch's last commit once work
# exists, a heartbeat comment an agent posts during a long build (renewing the
# lease without pushing red code), or the claim event while the branch still
# sits at main HEAD -- otherwise a quiet main would make every fresh, still-
# building claim look instantly stale. The ready-vs-keep decision uses the
# shared scripts/sweep-lease.mjs helper so it stays unit-tested.
# A crashed agent costs at most STALE_HOURS of delay, no human action.

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch: {}

permissions:
  issues: write
  contents: write   # delete orphaned (zero-commit) claim refs

env:
  STALE_HOURS: "2"

jobs:
  sweep:
    runs-on: ubuntu-latest
    steps:
      # Checkout so the github-script step can import the shared lease helper.
      - uses: actions/checkout@v4
      - uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.FACTORY_PAT || secrets.GITHUB_TOKEN }}
          script: |
            const { pathToFileURL } = require("node:url");
            const { isHeartbeat, leaseReference, isStale } = await import(
              pathToFileURL(`${process.env.GITHUB_WORKSPACE}/scripts/sweep-lease.mjs`).href
            );

            const STALE_MS = Number(process.env.STALE_HOURS) * 3600 * 1000;
            const now = Date.now();
            const stuck = await github.paginate(github.rest.issues.listForRepo, {
              owner: context.repo.owner, repo: context.repo.repo,
              state: "open", labels: "state:in-progress", per_page: 100,
            });
            for (const issue of stuck) {
              if (issue.pull_request) continue;
              const branch = `agent/issue-${issue.number}`;

              // Does the claim branch carry real work, or is it a pure claim ref
              // still pointing at main HEAD? This decides how we measure freshness:
              // a zero-commit claim's branch tip IS main's last commit, so timing it
              // from the commit date would make every fresh claim look stale the
              // moment main goes quiet for >STALE_HOURS. Compare first, then time.
              let aheadBy = null;
              try {
                const cmp = await github.rest.repos.compareCommitsWithBasehead({
                  owner: context.repo.owner, repo: context.repo.repo,
                  basehead: `main...${branch}`,
                });
                aheadBy = cmp.data.ahead_by;
              } catch (e) {
                // branch absent or uncomparable -> nothing to delete, treat as claim-timed
              }

              // Gather every proof of life, then let the shared helper pick the
              // freshest. The lease survives if ANY of these is recent:
              //  - the branch's last commit (real work in flight),
              //  - a heartbeat comment (a long build renewing its lease without
              //    pushing red code — this is what issue #8 adds),
              //  - the claim event (a just-claimed, still-building issue).

              // Last commit only counts as work when the branch is ahead of main;
              // a zero-commit claim's tip IS main HEAD and must not time from it.
              let lastCommitAt = null;
              if (aheadBy > 0) {
                try {
                  const c = await github.rest.repos.listCommits({
                    owner: context.repo.owner, repo: context.repo.repo, sha: branch, per_page: 1,
                  });
                  const d = c.data[0]?.commit?.committer?.date;
                  lastCommitAt = d ? new Date(d).getTime() : null;
                } catch (e) {
                  // branch vanished between compare and list -> leave null
                }
              }

              // Most recent state:in-progress labeling = the claim event.
              let claimAt = null;
              try {
                const events = await github.paginate(github.rest.issues.listEvents, {
                  owner: context.repo.owner, repo: context.repo.repo,
                  issue_number: issue.number, per_page: 100,
                });
                const claims = events
                  .filter((e) => e.event === "labeled" && e.label && e.label.name === "state:in-progress")
                  .map((e) => new Date(e.created_at).getTime());
                claimAt = claims.length ? Math.max(...claims) : null;
              } catch (e) {
                // timeline unreadable -> leave null
              }

              // Most recent heartbeat comment renews the lease without a push.
              let heartbeatAt = null;
              try {
                const comments = await github.paginate(github.rest.issues.listComments, {
                  owner: context.repo.owner, repo: context.repo.repo,
                  issue_number: issue.number, per_page: 100,
                });
                const beats = comments
                  .filter((c) => isHeartbeat(c.body || ""))
                  .map((c) => new Date(c.created_at).getTime());
                heartbeatAt = beats.length ? Math.max(...beats) : null;
              } catch (e) {
                // comments unreadable -> leave null
              }

              const { ref, source } = leaseReference({
                lastCommitAt, heartbeatAt, claimAt,
                fallbackAt: new Date(issue.updated_at).getTime(),
              });
              if (!isStale(ref, now, STALE_MS)) continue;

              const labels = issue.labels.map(l => l.name).filter(l => !l.startsWith("state:"));
              labels.push("state:ready");
              await github.rest.issues.setLabels({ owner: context.repo.owner, repo: context.repo.repo, issue_number: issue.number, labels });
              await github.rest.issues.removeAssignees({
                owner: context.repo.owner, repo: context.repo.repo, issue_number: issue.number,
                assignees: issue.assignees.map(a => a.login),
              }).catch(() => {});

              // A pure claim (zero commits beyond main, no PR) is litter: delete the
              // ref so the issue can be cleanly re-claimed. Never delete a branch that
              // has commits — that work is recoverable and stays for a human to inspect.
              let deleted = false;
              if (aheadBy === 0) {
                await github.rest.git.deleteRef({
                  owner: context.repo.owner, repo: context.repo.repo, ref: `heads/${branch}`,
                }).then(() => { deleted = true; }).catch(() => {});
              }

              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo, issue_number: issue.number,
                body: deleted
                  ? `Stale claim swept: \`${branch}\` had no work for >${process.env.STALE_HOURS}h (measured from ${source}). Orphaned claim ref deleted; issue returned to \`state:ready\`.`
                  : `Stale claim swept: no activity on \`${branch}\` for >${process.env.STALE_HOURS}h (measured from ${source}). Branch kept (has commits); issue returned to \`state:ready\`.`,
              });
            }
