name: release

# The opt-in release lane: the post-merge "ship" stage. Tags a version,
# publishes a changelog built from the titles of the PRs merged since the last
# release, and can optionally run a repo-owned deploy command after the tag and
# release exist.
#
# OPT-IN and SAFE BY DEFAULT: the job is skipped unless the repo variable
# RATCHET_RELEASE is set to "true". With it unset (the default) this workflow
# exists but does nothing — no tag, no release, no failure. To enable:
#   gh variable set RATCHET_RELEASE --body true
# Disable any time by setting RATCHET_RELEASE=false — the workflow stays but
# no-ops.
#
# ON DEMAND: run it from the Actions tab (or `gh workflow run release.yml`)
# after merging a batch. It is deliberately not tied to every merge, so a
# release happens exactly when you decide to ship, not on every PR.
#
# OPTIONAL DEPLOY: set RATCHET_DEPLOY=true and RATCHET_DEPLOY_COMMAND to a
# repo-specific shell command. Without RATCHET_DEPLOY=true, no deploy step is
# added and no deploy config is required. A deploy failure fails the workflow
# visibly after publication; it never deletes or mutates the tag/release.

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Semver part to bump for the new tag"
        type: choice
        default: patch
        options: [patch, minor, major]

permissions:
  contents: write        # create the bump branch, tag, and GitHub release
  pull-requests: write   # open the reviewable version bump PR

concurrency:
  group: release           # never two releases racing on the same tag sequence
  cancel-in-progress: false # queue, don't cancel

jobs:
  release:
    if: ${{ vars.RATCHET_RELEASE == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "20"
      - id: publish
        run: node scripts/release.mjs
        env:
          GITHUB_TOKEN: ${{ secrets.FACTORY_PAT || secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          RELEASE_BUMP: ${{ inputs.bump }}
      # Prove the documented install path works against the tag we just cut:
      # fetch bootstrap.sh from the new tag over HTTPS (the exact URL the README
      # tells users to run) and dry-run it. `set -euo pipefail` + `curl -f` mean
      # a 404 on the ref or any bootstrap failure fails this job loudly, so a
      # broken install can never pass silently. Dry-run writes nothing.
      - name: Smoke-test the published install path
        if: ${{ steps.publish.outputs.released == 'true' }}
        env:
          RELEASE_TAG: ${{ steps.publish.outputs.version }}
          INSTALL_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          url="https://raw.githubusercontent.com/${INSTALL_REPO}/${RELEASE_TAG}/scripts/bootstrap.sh"
          echo "Smoke-testing install from ${url}"
          curl -fsSL "$url" -o /tmp/ratchet-bootstrap.sh
          bash /tmp/ratchet-bootstrap.sh --version "${RELEASE_TAG}" --dry-run
          echo "Install smoke test passed for ${RELEASE_TAG}."
      - name: Deploy
        if: ${{ vars.RATCHET_DEPLOY == 'true' && steps.publish.outputs.released == 'true' }}
        run: |
          if [ -z "${RATCHET_DEPLOY_COMMAND}" ]; then
            echo "::error::RATCHET_DEPLOY=true but RATCHET_DEPLOY_COMMAND is empty. Set a repo-specific deploy command or disable RATCHET_DEPLOY."
            exit 1
          fi
          eval "$RATCHET_DEPLOY_COMMAND"
        env:
          RATCHET_DEPLOY_COMMAND: ${{ vars.RATCHET_DEPLOY_COMMAND }}
          RELEASE_VERSION: ${{ steps.publish.outputs.version }}
          RELEASE_URL: ${{ steps.publish.outputs.release_url }}

  # When RATCHET_RELEASE is not "true" the release job's `if` skips it. A skipped
  # job leaves the run silent about why nothing shipped, so this companion job
  # runs in exactly that case and reports the reason and the fix — the dispatch
  # succeeds visibly instead of no-opping without explanation.
  report-skip:
    if: ${{ vars.RATCHET_RELEASE != 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Explain why the release was skipped
        env:
          RATCHET_RELEASE: ${{ vars.RATCHET_RELEASE }}
        run: |
          echo "::notice title=Release skipped::RATCHET_RELEASE is '${RATCHET_RELEASE:-unset}', not 'true' — the release lane is off by default."
          echo "No tag or release was published. To enable the release lane, run:"
          echo "  gh variable set RATCHET_RELEASE --body true"
          echo "then re-dispatch this workflow."
