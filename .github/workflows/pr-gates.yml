name: pr-gates

# Runs the GATES.md gates server-side on every agent PR, so the human
# reviewer's trust anchor is a machine-verified check — not just the agent's
# self-reported gate checklist in the PR body. Both this workflow and the
# local verify step (AGENTS.md step 4) invoke scripts/run-gates.mjs, which
# parses the commands out of GATES.md, so CI and the developer machine can
# never run a different set of gates.

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  gates:
    # Only PRs coming from an agent/issue-* branch carry the self-reported
    # checklist this backstops; skip everything else.
    if: startsWith(github.head_ref, 'agent/issue-')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "20"
      - name: Run GATES.md gates
        run: node scripts/run-gates.mjs

  # Enforce the AGENTS.md step 3 scope cap mechanically: an oversized agent PR
  # is the biggest drain on review, the loop's bottleneck. Thresholds live in
  # GATES.md; the PR's size comes from the event payload. A separate job so the
  # red check reads "size" distinctly from the gate failures.
  size:
    if: startsWith(github.head_ref, 'agent/issue-')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "20"
      - name: Check agent PR size
        run: node scripts/pr-size-check.mjs
        env:
          PR_ADDITIONS: ${{ github.event.pull_request.additions }}
          PR_DELETIONS: ${{ github.event.pull_request.deletions }}
          PR_CHANGED_FILES: ${{ github.event.pull_request.changed_files }}
