name: unblock-dependents

# When an issue closes (e.g. via "Closes #N" on a merged PR), two jobs:
# 1. Strip the closed issue's own state:* label — the lifecycle labels describe
#    open work, and a lingering state:in-review on a closed issue misleads.
# 2. Find every issue blocked only by it and, if all their blockers are now
#    closed, re-feed it into the queue. Promotion is NOT unconditional: an
#    unblocked issue only goes to state:ready if it still carries acceptance
#    criteria; without them it is held at state:draft (an agent must never pick
#    an issue with no test plan). The ready-vs-draft decision is made by the
#    SAME shared helper the plan compiler uses (scripts/criteria.mjs), so the
#    two can never disagree.

on:
  issues:
    types: [closed]

permissions:
  issues: write

jobs:
  unblock:
    runs-on: ubuntu-latest
    steps:
      # Checkout so the github-script step can import the shared readiness
      # helper (scripts/criteria.mjs) — the single source of truth for the
      # ready-vs-draft decision, reused from the plan compiler.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7.1.0
        with:
          # Prefer a PAT so this workflow can trigger further workflows.
          # Falls back to the default token (fine for pure human-merge flows).
          github-token: ${{ secrets.FACTORY_PAT || secrets.GITHUB_TOKEN }}
          script: |
            const { pathToFileURL } = require("node:url");
            const { classifyUnblock } = await import(
              pathToFileURL(`${process.env.GITHUB_WORKSPACE}/scripts/criteria.mjs`).href
            );

            const closed = context.payload.issue.number;

            // The state machine only applies to open issues: closed means done
            // (or discarded), so the lifecycle label comes off.
            const ownLabels = (context.payload.issue.labels || []).map(l => l.name);
            const kept = ownLabels.filter(l => !l.startsWith("state:"));
            if (kept.length !== ownLabels.length) {
              await github.rest.issues.setLabels({ owner: context.repo.owner, repo: context.repo.repo, issue_number: closed, labels: kept });
            }

            const all = await github.paginate(github.rest.issues.listForRepo, {
              owner: context.repo.owner, repo: context.repo.repo, state: "open", per_page: 100,
            });
            for (const issue of all) {
              if (issue.pull_request) continue;
              const blockers = [...(issue.body || "").matchAll(/Blocked by #(\d+)/g)].map(m => Number(m[1]));
              if (!blockers.includes(closed)) continue;

              // Are ALL blockers now closed?
              let allClosed = true;
              for (const n of blockers) {
                const b = await github.rest.issues.get({ owner: context.repo.owner, repo: context.repo.repo, issue_number: n });
                if (b.data.state !== "closed") { allClosed = false; break; }
              }
              if (!allClosed) continue;

              // Only promote to ready if criteria survive; else hold as draft.
              const { state, comment } = classifyUnblock(issue.body || "", closed);
              const labels = issue.labels.map(l => l.name).filter(l => !l.startsWith("state:"));
              labels.push(state);
              await github.rest.issues.setLabels({ owner: context.repo.owner, repo: context.repo.repo, issue_number: issue.number, labels });
              await github.rest.issues.createComment({ owner: context.repo.owner, repo: context.repo.repo, issue_number: issue.number, body: comment });
            }
