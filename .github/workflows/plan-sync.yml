name: plan-sync

# Compiles plan/*.md into GitHub issues when plans land on main (i.e. when a
# planning PR is merged). Scoped to main so pushing the planning branch does NOT
# create issues early — the PR review gate is preserved.

on:
  push:
    branches: [main]
    paths:
      - "plan/**"
  workflow_dispatch: {}   # allow manual re-sync

permissions:
  issues: write
  contents: read

# Serialize syncs: two planning PRs merged in quick succession must not run in
# parallel, or both list issues before either creates and both create the same
# new slug — duplicate issues with the same plan-id. A stable group name (no
# per-run interpolation) puts every sync in one lane; cancel-in-progress: false
# queues the next run instead of dropping its batch.
concurrency:
  group: plan-sync          # stable: every sync shares one lane
  cancel-in-progress: false # queue, never drop a batch

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: node scripts/plan-sync.mjs
        env:
          GITHUB_TOKEN: ${{ secrets.FACTORY_PAT || secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
